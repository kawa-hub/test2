<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>歯科医院ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f7fa;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}

th {
  background: #4CAF50;
  color: white;
}

canvas {
  background: white;
  padding: 10px;
}
</style>
</head>

<body>

<h1>歯科医院ダッシュボード</h1>
<input type="file" id="csvFile" accept=".csv">

<div class="container">

  <!-- テーブル -->
  <div>
    <h2>スタッフ別集計</h2>
    <table id="resultTable">
      <thead>
        <tr>
          <th>スタッフ</th>
          <th>予約数</th>
          <th>稼働率</th>
          <th>リピート率</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- グラフ -->
  <div>
    <h2>スタッフ別 稼働率推移</h2>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let chart;

document.getElementById('csvFile').addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;
    const data = parseCSV(text);
    analyzeData(data);
  };

  reader.readAsText(file);
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',');

  return lines.slice(1)
    .filter(line => line.trim() !== "")
    .map(line => {
      const values = line.split(',');
      let obj = {};
      headers.forEach((h, i) => obj[h.trim()] = values[i]?.trim());
      return obj;
    });
}

function analyzeData(data) {
  const staffStats = {};
  const staffDaily = {};
  const allDates = new Set();

  data.forEach(row => {
    const staff = row.staff;
    const patient = row.patient_id;
    const status = row.status;
    const date = row.date;

    allDates.add(date);

    // スタッフ集計
    if (!staffStats[staff]) {
      staffStats[staff] = {
        total: 0,
        completed: 0,
        patients: {}
      };
    }

    staffStats[staff].total++;

    if (status === "completed") {
      staffStats[staff].completed++;
    }

    if (!staffStats[staff].patients[patient]) {
      staffStats[staff].patients[patient] = 0;
    }
    staffStats[staff].patients[patient]++;

    // スタッフ×日別
    if (!staffDaily[staff]) {
      staffDaily[staff] = {};
    }

    if (!staffDaily[staff][date]) {
      staffDaily[staff][date] = {
        total: 0,
        completed: 0
      };
    }

    staffDaily[staff][date].total++;

    if (status === "completed") {
      staffDaily[staff][date].completed++;
    }
  });

  renderTable(staffStats);
  renderChart(staffDaily, Array.from(allDates).sort());
}

// テーブル
function renderTable(stats) {
  const tbody = document.querySelector("#resultTable tbody");
  tbody.innerHTML = "";

  Object.keys(stats).forEach(staff => {
    const s = stats[staff];

    const utilization = ((s.completed / s.total) * 100).toFixed(1);

    let repeatPatients = 0;
    let totalPatients = Object.keys(s.patients).length;

    Object.values(s.patients).forEach(count => {
      if (count > 1) repeatPatients++;
    });

    const repeatRate = totalPatients > 0
      ? ((repeatPatients / totalPatients) * 100).toFixed(1)
      : 0;

    tbody.innerHTML += `
      <tr>
        <td>${staff}</td>
        <td>${s.total}</td>
        <td>${utilization}%</td>
        <td>${repeatRate}%</td>
      </tr>
    `;
  });
}

// ⭐ スタッフ別 × 日別グラフ
function renderChart(staffDaily, dates) {
  const datasets = [];

  Object.keys(staffDaily).forEach(staff => {
    const data = dates.map(date => {
      const d = staffDaily[staff][date];
      if (!d) return null;

      return d.total > 0
        ? (d.completed / d.total * 100).toFixed(1)
        : 0;
    });

    datasets.push({
      label: staff,
      data: data,
      tension: 0.3
    });
  });

  const ctx = document.getElementById('chart').getContext('2d');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: datasets
    },
    options: {
      scales: {
        y: {
          min: 0,
          max: 100
        }
      }
    }
  });
}
</script>

</body>
</html>
